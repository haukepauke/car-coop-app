# Prefer predictable memory usage over peak build speed. This helps on 16 GB
# machines where a clean release build can otherwise start too many JVMs.
org.gradle.jvmargs=-Xms512m -Xmx2G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.workers.max=2
org.gradle.parallel=false
org.gradle.daemon=false
kotlin.daemon.jvmargs=-Xmx1G
android.useAndroidX=true
android.enableJetifier=true
