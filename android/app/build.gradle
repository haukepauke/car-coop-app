import com.android.build.gradle.internal.api.ApkVariantOutputImpl

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def resolveAppVersion() {
    def pubspecFile = rootProject.file("../pubspec.yaml")
    if (!pubspecFile.exists()) {
        return [flutter.versionName, flutter.versionCode]
    }

    def versionLine = pubspecFile.readLines().find { it ==~ /^\s*version:\s*.+$/ }
    if (versionLine == null) {
        return [flutter.versionName, flutter.versionCode]
    }

    def rawVersion = versionLine.split(":", 2)[1].trim().replace('"', "").replace("'", "")
    def versionParts = rawVersion.tokenize("+")
    def versionName = versionParts[0]
    def versionCode = versionParts.size() > 1 ? versionParts[1].toInteger() : flutter.versionCode

    return [versionName, versionCode]
}

def (appVersionName, appVersionCode) = resolveAppVersion()

android {
    namespace = "net.carcoop.app"
    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId = "net.carcoop.app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        // Keep Gradle wrapper builds aligned with the Flutter app version.
        versionCode = appVersionCode
        versionName = appVersionName
        manifestPlaceholders += [usesCleartextTraffic: "false"]
    }

    buildTypes {
        debug {
            manifestPlaceholders.usesCleartextTraffic = "true"
        }

        release {
            manifestPlaceholders.usesCleartextTraffic = "false"
        }
    }
}

def abiCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]

android.applicationVariants.configureEach { variant ->
    variant.outputs.each { output ->
        def abiVersionCode = abiCodes[output.filters.find { it.filterType == "ABI" }?.identifier]
        if (abiVersionCode != null) {
            (output as ApkVariantOutputImpl).versionCodeOverride = variant.versionCode * 10 + abiVersionCode
        }
    }
}

flutter {
    source "../.."
}
